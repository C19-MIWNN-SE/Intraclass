<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title th:text="${pageTitle}"></title>>
    <meta charset="UTF-8">
</head>

<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
        <h1 class="main-title text-primary m-0"><i class="bi bi-pencil-square"></i> Edit Cohort</h1>
    </div>

    <div class="cohort-banner-block shadow-sm">
        <form th:fragment="cohort-add-edit-form" th:action="@{/cohort/save}"
              th:object="${cohort}" method="post" enctype="multipart/form-data">

            <div class="card shadow-sm p-4 mb-4">
                <input type="hidden" th:field="*{id}" th:value="${cohort.id}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Cohort Name</label>
                        <input type="text" class="form-control rounded-pill mb-2" th:field="*{name}">
                        <div class="text-danger small" th:if="${#fields.hasErrors('name')}"
                             th:errors="*{name}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Description</label>
                        <input type="text" class="form-control rounded-pill mb-2" th:field="*{description}">
                        <div class="text-danger small" th:if="${#fields.hasErrors('description')}"
                             th:errors="*{description}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Start Date</label>
                        <input type="date" class="form-control rounded-pill mb-2" th:field="*{startDate}">
                        <div class="text-danger small" th:if="${#fields.hasErrors('startDate')}"
                             th:errors="*{startDate}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">End Date</label>
                        <input type="date" class="form-control rounded-pill mb-2" th:field="*{endDate}">
                        <div class="text-danger small" th:if="${#fields.hasErrors('endDate')}"
                             th:errors="*{endDate}"></div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-3">
                <a th:href="@{/cohort/overview}">Cancel</a>
                <button class="btn btn-primary rounded mb-2" type="submit">
                    <i class="fa-solid fa-floppy-disk"></i> Save
                </button>
            </div>
        </form>
    </div>
</div>
<div th:replace="~{fragments/general :: scripts}"></div>
<footer th:replace="~{fragments/general :: footer}"></footer>
</body>
</html>
