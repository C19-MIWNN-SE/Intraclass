<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>New User</title>
</head>
<body>
<h1>Create New User</h1>
<form th:action="@{/user/save}" method="post"
      th:object="${newUser}">
  <div class="mb-3">
    <label for="username" class="form-label">Username</label>
    <input type="text" id="username"
           class="form-control" th:field="*{username}" required/>
  </div>
  <div class="mb-3">
    <label for="plainPassword" class="form-label">Password</label>
    <input type="password" id="plainPassword"
           class="form-control"
           th:field="*{plainPassword}" required/>
  </div>
  <div class="mb-3">
    <label for="role" class="form-label">Rol</label>
    <select id="role" class="form-select" th:field="*{role}">
      <option value="TEACHER">TEACHER</option>
      <option value="STUDENT">STUDENT</option>
    </select>
  </div>
  <button type="submit" class="btn btn-primary">Create</button>
  <a th:href="@{/user/all}" class="btn btn-secondary">Cancel</a>
</form>
</body>
</html>
