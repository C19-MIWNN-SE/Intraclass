<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title th:text="${pageTitle}">User Management</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>
<div class="container-fluid p-4">
    <h1>User Management</h1>
<div th:if="${successMessage}"
     class="alert alert-success"
     th:text="${successMessage}"></div>
<table class="table">
    <thead>
    <tr>
        <th>User</th>
        <th>Role</th>
        <th>Actions</th>
        <th>Profile Image</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.username}"></td>
        <td th:text="${user.role}"></td>
        <td>
            <form th:action="@{/user/delete/{id}(id=${user.id})}"
                  method="post">
                <button type="submit"
                        class="btn btn-danger btn-sm">
                    Delete
                </button>
            </form>
        </td>
        <td>
            <img th:if="${user.image != null}"
                 th:src="@{/images/{id}(id=${user.image.id})}"
                 class="rounded-circle"
                 th:alt="${user.username}"
                 style="width: 50px; height: 50px; object-fit: cover;">
        </td>
    </tr>
    </tbody>
</table>
<a th:href="@{/user/add}" class="btn btn-primary">
    New User
</a>
<div th:replace="~{fragments/general :: scripts}"></div>
</div>
<footer th:replace="~{fragments/general :: footer}"></footer>
</body>
</html>
