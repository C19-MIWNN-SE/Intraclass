<!DOCTYPE html>

<!--Author: G. Neuteboom-->

<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title th:text="${pageTitle}">Cohort View</title>
    <meta charset="UTF-8">
</head>

<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container mt-4">
    <div class="p-5 mb-4 bg-light rounded-3 shadow-sm border-start border-primary border-5">
        <h1 class="display-5 fw-bold" th:text="'Cohort: ' + ${cohort.name}">Cohort Name</h1>

        <div class="row mt-3">
            <div class="col-md-6">
                <p class="mb-1"><strong>Description:</strong> <span th:text="${cohort.description}">Description</span></p>
            </div>
            <div class="col-md-6 text-md-end">
                <p class="mb-1 text-muted"><strong>Start:</strong> <span th:text="${#temporals.format(cohort.startDate, 'dd-mm-yyyy')}">1997-01-01</span></p>
                <p class="mb-1 text-muted"><strong>End:</strong> <span th:text="${#temporals.format(cohort.endDate, 'dd-mm-yyyy')}">1999-12-31</span></p>
            </div>
            <p> </p>
            <button type="button"
                    class="btn btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#addEditCohortModal"
                    sec:authorize="hasRole('TEACHER')">Edit Cohort
            </button>
        </div>
    </div>

    <h3 class="mb-4 text-primary"><i class="fa-solid fa-chalkboard-user"></i> Teachers in this cohort</h3>
    <div th:replace="~{fragments/carousel :: peopleCarousel(people=${teachers}, id='teacherCarousel', type='teacher')}"></div>
    <hr class="my-5">

    <h3 class="mb-4 text-info"><i class="bi bi-mortarboard-fill"></i> Students in this cohort</h3>
    <div th:replace="~{fragments/carousel :: peopleCarousel(people=${students}, id='studentCarousel', type='student')}"></div>
</div>

<div th:replace="~{fragments/general :: scripts}"></div>
<footer th:replace="~{fragments/general :: footer}"></footer>
</body>
</html>
