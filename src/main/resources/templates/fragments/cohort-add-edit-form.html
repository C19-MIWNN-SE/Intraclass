<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<form th:fragment="cohort-add-edit-form" sec:authorize="hasRole('TEACHER')" th:action="@{/cohort/add}"
      th:object="${cohort}" method="post" enctype="multipart/form-data" xmlns:sec="http://www.w3.org/1999/xhtml">

    <div class="card shadow-sm p-4 mb-4">
        <input type="hidden" th:field="*{id}" />

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Cohort Name</label>
                <input type="text" class="form-control rounded-pill mb-2" th:field="*{cohortName}">
                <div class="text-danger small" th:if="${#fields.hasErrors('cohortName')}" th:errors="*{cohortName}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Description</label>
                <input type="text" class="form-control rounded-pill mb-2" th:field="*{description}">
                <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>

            <div class="col-md-4">
                <label class="form-label">Start Date</label>
                <input type="date" class="form-control rounded-pill mb-2" th:field="*{startDate}">
                <div class="text-danger small" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
            </div>

            <div class="col-md-4">
                <label class="form-label">End Date</label>
                <input type="date" class="form-control rounded-pill mb-2" th:field="*{endDate}">
                <div class="text-danger small" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Members</label>
                <input class="form-control rounded-pill mb-2" th:field="*{lastName}">
                <div class="text-danger small" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
            </div>

        </div>
    </div>

    <div class="d-flex justify-content-between mt-3">
        <button type="button" class="btn btn-secondary rounded mb-2" data-bs-dismiss="modal">
            Cancel
        </button>

        <button class="btn btn-primary rounded mb-2" type="submit">
            <i class="fa-solid fa-floppy-disk"></i> Save
        </button>
    </div>
</form>

</html>
