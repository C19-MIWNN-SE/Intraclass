<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="baseheader(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:replace="${title}">This is the base title</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Navbar fragment -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg mb-2"
     th:classappend="${activePage == 'login'} ?
     'navbar-light bg-tertiary border-bottom border-2 border-dark' : 'navbar-dark bg-primary'">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="container-fluid">
        <a class="navbar-brand" href="/" th:if="${activePage != 'login'}">
            <img src="/img/IntraClass.png" alt="Bootstrap" width="100px">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" th:classappend="${activePage == 'login'} ? 'active' : ''"
                       th:href="@{/login}">
                        <i class="bi bi-file-earmark-person-fill"></i> My Account</a>
                </li>

                <div class="vr mx-2"></div>

                <li class="nav-item">
                    <a class="nav-link" aria-current="page" th:classappend="${activePage == 'students'} ? 'active' : ''"
                       th:href="@{/student/overview}" sec:authorize="hasRole('TEACHER')">
                        <i class="bi bi-mortarboard-fill"></i> Students
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" th:classappend="${activePage == 'teachers'} ? 'active' : ''"
                       th:href="@{/teacher/overview}" sec:authorize="hasRole('TEACHER')">
                        <i class="fa-solid fa-chalkboard-user"></i> Teachers
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" th:classappend="${activePage == 'cohorts'} ? 'active' : ''"
                       th:href="@{/cohort/overview}" sec:authorize="hasRole('TEACHER')">
                        <i class="fa-solid fa-building-columns"></i> Cohorts
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="#" sec:authorize="hasRole('STUDENT')">
                        <i class="fa-solid fa-link"></i> Enrolled Cohorts
                    </a>
                </li>
            </ul>
            <form th:action="@{/logout}" sec:authorize="isAuthenticated()" class="d-flex" method="post">
                <button class="btn btn-m"
                        th:classappend="${activePage != 'login'} ? 'btn-outline-light' : 'btn-outline-dark'"
                        type="submit"><i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<!-- Bootstrap js loader -->
<div th:fragment="scripts">
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}">
    </script>
</div>

<footer th:fragment="footer" class="bg-info text-light text-center py-3 mt-auto">
    <div class="container">
        <small>&copy; 2026 IntraClass™ Internal Face Book. All rights reserved.</small>
    </div>
</footer>
</body>
</html>
