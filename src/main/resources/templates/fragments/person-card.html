<div th:fragment="personCard(person)" class="person-card">
    <div class="book">
        <div class="card-content">
            <div class="profile-img-container">
                <img src="https://placehold.co/400" alt="Profile" class="profile-img">
            </div>
            <h6 class="details-title">Detailed Info</h6>
            <ul class="parameter-list">
                <li><span class="label">Full Name:</span> [[${person.getFullName}]]</li>
                <li><span class="label">Unique ID:</span> [[${person.id}]]</li>
                <li><span class="label">Current Age:</span> [[${person.getAge(T(java.time.LocalDate).now())}]]</li>
                <li><span class="label">Date of Birth:</span> [[${person.dateOfBirth}]]</li>
            </ul>

            <div class="card-actions">
                <a th:href="@{/student/edit/{id}(id=${person.id})}"
                   th:if="${person instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Student)}"
                   class="bi bi-pencil-square"></a>
                <a th:href="@{/teacher/edit/{id}(id=${person.id})}"
                   th:if="${person instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Teacher)}"
                   class="bi bi-pencil-square" ></a>
                <a th:href="@{/student/delete/{id}(id=${person.id})}"
                   th:if="${person instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Student)}"
                   class="bi bi-emoji-dizzy"></a>
                <a th:href="@{/teacher/delete/{id}(id=${person.id})}"
                   th:if="${person instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Teacher)}"
                   class="bi bi-emoji-dizzy"></a>
            </div>
        </div>

        <div class="cover">
            <div class="cover-top-half">
                <img src="https://ui-avatars.com/api/?name=User&background=333&color=fff" class="cover-img">
            </div>
            <div class="cover-bottom-half">
                <h5 th:text="${person.fullName}">Name</h5>
                <p th:if="${person instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Teacher)}"
                        class="status-badge">Teacher</p>
                <p th:if="${person instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Student)}"
                   class="status-badge">Student</p>

                <div th:if="${person instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Teacher)}" class="role-info">
                    <strong>Specialty:</strong>
                    <span th:text="${person.specialty ?: 'General'}">Specialty</span>
                </div>

                <div th:if="${person instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Student)}" class="role-info">
                    <strong>Cohorts:</strong>
                    <ul class="cohort-list">
                        <li th:each="cohort : ${person.cohort}" th:text="${cohort.name}">Cohort Name</li>
                    </ul>
                    <strong>Employer:</strong>
                    <span th:text="${person.employer}">Employer</span>
                    <strong>City:</strong>
                    <span th:text="${person.city}">City</span>
                </div>
            </div>
        </div>
    </div>
</div>
