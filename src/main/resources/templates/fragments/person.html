<table th:fragment="teacherTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Affix</th>
        <th>Last Name</th>
        <th>Date of Birth</th>
        <th>Age</th>
    </tr>
    </thead>
    <tbody th:each="person: ${people}">
    <tr th:if="${person instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Teacher)}">
        <td th:text="${person.id}">Titel</td>
        <td th:text="${person.firstName}">Auteur</td>
        <td th:text="${person.affix}">0000</td>
        <td th:text="${person.lastName}">0000</td>
        <td th:text="${person.dateOfBirth}">0000</td>
        <td th:text="${person.getAge(T(java.time.LocalDate).now())}">000</td>
    </tr>
    </tbody>
</table>
<table th:fragment="studentTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Affix</th>
        <th>Last Name</th>
        <th>Date of Birth</th>
        <th>Age</th>
    </tr>
    </thead>
    <tbody th:each="person: ${people}">
        <tr th:if="${person instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Student)}">
            <td th:text="${person.id}">Titel</td>
            <td th:text="${person.firstName}">Auteur</td>
            <td th:text="${person.affix}">0000</td>
            <td th:text="${person.lastName}">0000</td>
            <td th:text="${person.dateOfBirth}">0000</td>
            <td th:text="${person.getAge(T(java.time.LocalDate).now())}">000</td>
        </tr>
    </tbody>
</table>
