<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="eng">
<body>
<h1 class="main-title" th:text="${pageTitle}"></h1>

<form th:action="@{/teacher/save}" th:object="${teacher}" method="post" enctype="multipart/form-data">
    <div th:replace="~{fragments/person-form :: person-form-fragment}"></div>
    <div th:replace="~{fragments/person-form :: teacher-form-fragment}"></div>
    <button type="submit">Save</button>
    <a th:href="@{/teacher/overview}">Cancel</a>
</form>
<div th:replace="~{fragments/general :: scripts}"></div>
<footer th:replace="~{fragments/general :: footer}"></footer>
</body>
</html>
