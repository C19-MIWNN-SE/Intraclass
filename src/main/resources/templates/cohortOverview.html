<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title th:text="${pageTitle}"></title>>
    <meta charset="UTF-8">
</head>

<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<h1 th:text="${pageTitle}">Cohort Overview Page</h1>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Start Date</th>
        <th>End Date</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="cohort: ${cohorts}">
        <td th:text="${cohort.id}">ID</td>
        <td th:text="${cohort.name}">Name</td>
        <td th:text="${cohort.description}">Description</td>
        <td th:text="${cohort.startDate}">Start Date</td>
        <td th:text="${cohort.endDate}">End Date</td>
    </tr>
    </tbody>
</table>



<nav th:replace="~{fragments/general :: footer}"></nav>
</body>
</html>
