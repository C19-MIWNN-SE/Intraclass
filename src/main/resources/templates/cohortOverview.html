<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title th:text="${pageTitle}"></title>>
    <meta charset="UTF-8">
</head>

<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
        <h1 class="main-title text-primary m-0">Cohort Overview</h1>
        <a class="btn btn-primary shadow-sm"
           data-bs-toggle="modal"
           data-bs-target="#editCohortModal">
            <i class="bi bi-plus-lg me-1"></i> Add New Cohort
        </a>
    </div>

    <div class=" cohort-banner-block shadow-sm">
<table class="table table-striped table-hover">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th></th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="cohort: ${cohorts}">
        <td th:text="${cohort.id}">ID</td>
        <td th:text="${cohort.name}">Name</td>
        <td th:text="${cohort.description}">Description</td>
        <td th:text="${#temporals.format(cohort.startDate, 'dd-mm-yyyy')}">Start Date</td>
        <td th:text="${#temporals.format(cohort.endDate, 'dd-mm-yyyy')}">End Date</td>
        <td>
            <div class="ms-auto btn-group-sm">
                <a th:href="@{/cohort/view/{id}(id=${cohort.id})}" class="btn btn-sm btn-outline-primary px-3">View</a>
                <a th:href="@{/cohort/edit/{id}(id=${cohort.id})}" class="btn btn-sm btn-outline-secondary px-3">Edit</a>
            </div>
        </td>
    </tr>
    </tbody>
</table>
    </div>

    <div class="col text-center">
        <a href="#top" class="btn btn-primary shadow-sm">Go to Top</a>
    </div>

</div>

<!-- TODO deze code tot en met regel 115 kan weg mits de nieuwe table bevalt. -->

<div th:replace="~{fragments/general :: scripts}"></div>
<footer th:replace="~{fragments/general :: footer}"></footer>


<div class="modal fade" id="editCohortModal"
     tabindex="-1"
     aria-labelledby="editCohortModalLabel"
     aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <!-- Header -->
            <div class="modal-header">
                <h5 class="modal-title"
                    id="editCohortModalLabel">
                    Add or Edit Cohort
                </h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"></button>
            </div>
<!--            <div class="modal-body" th:insert="~{fragments/cohort-add-edit-form :: cohort-add-edit-form}">-->
<!--&lt;!&ndash;                <form sec:authorize="hasRole('TEACHER')"&ndash;&gt;-->
<!--&lt;!&ndash;                      th:replace="~{fragments/cohort-add-edit-form :: cohort-add-edit-form}"></form>&ndash;&gt;-->
<!--            </div>-->
        </div>
    </div>
</div>


</body>
</html>
