<!DOCTYPE html>

<!--Author: G. Neuteboom-->

<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title th:text="${pageTitle}"></title>>
    <meta charset="UTF-8">
</head>

<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<h1 th:text="${pageTitle}"></h1>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th></th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="cohort: ${cohorts}">
        <td th:text="${cohort.id}">ID</td>
        <td th:text="${cohort.name}">Name</td>
        <td th:text="${cohort.description}">Description</td>
        <td th:text="${cohort.startDate}">Start Date</td>
        <td th:text="${cohort.endDate}">End Date</td>
        <td>
            <a th:href="@{/cohort/{id}(id=${cohort.id})}">View Cohort</a>
        </td>
        <td>
            <button type="button"
                    class="btn btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#addEditCohortModal"
                    sec:authorize="hasRole('TEACHER')">Edit Cohort</button>
        </td>
    </tr>
    </tbody>
</table>

<button type="button"
        class="btn btn-primary"
        data-bs-toggle="modal"
        data-bs-target="#addEditCohortModal"
        sec:authorize="hasRole('TEACHER')">Add Cohort</button>


<div th:replace="~{fragments/general :: scripts}"></div>
<footer th:replace="~{fragments/general :: footer}"></footer>
</body>
</html>
