<!DOCTYPE html>

<!--Made by nimble hands of Danylo Dudar-->

<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title th:text="${pageTitle}"></title>>
    <meta charset="UTF-8">
</head>

<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>
<div class="container-fluid p-4">
    <h3 class="mb-4 text-primary">
        <i class="fa-solid fa-chalkboard-user"></i>
        <span th:text="${pageTitle}">Overview</span>
    </h3>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">
        <div class="col" th:each="p : ${people}"
             th:if="${p instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Teacher)}">

            <div th:replace="~{fragments/person-card :: personCard(person=${p})}"></div>
        </div>

        <div class="col">
            <div th:replace="~{fragments/person-card :: addPersonCard(type='teacher')}"></div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(people)}" class="text-center mt-5">
        <p class="text-muted">No entries found.</p>
        <a th:href="@{/teacher/add}" class="btn btn-primary">Add New Teacher</a>
    </div>
</div>
<div th:replace="~{fragments/general :: scripts}"></div>
<footer th:replace="~{fragments/general :: footer}"></footer>
</body>
</html>
