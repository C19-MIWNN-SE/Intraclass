<!DOCTYPE html>

<!--Made by nimble hands of Danylo Dudar-->

<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title th:text="${pageTitle}"></title>>
    <meta charset="UTF-8">
</head>

<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>
<div class="container-fluid p-4">
    <h1 class="main-title" th:text="${pageTitle}"></h1>
    <div th:each="person : ${people}"
         th:if="${person instanceof T(nl.miwnn.ch19.DaMaGe.IntraClass.model.Teacher)}"
         class="col-md-4 mb-3">

        <div th:replace="~{fragments/person-card :: personCard(person=${person})}"></div>
    </div>

    <div class="mb-3">
        <a th:href="@{/teacher/add}">Add New Teacher</a>
    </div>
</div>
<div th:replace="~{fragments/general :: scripts}"></div>
<footer th:replace="~{fragments/general :: footer}"></footer>
</body>
</html>
